# Kitty terminal configuration
# Translated from Alacritty config

# Window settings
window_padding_width 5
window_title "The downward spiral"
macos_titlebar_color background

# Font settings
font_family MesloLGS NF
font_size 12
bold_font MesloLGS NF Bold
italic_font MesloLGS NF Italic
bold_italic_font MesloLGS NF Bold Italic

# Cursor settings
cursor_blink_interval 0.5
cursor_shape beam
cursor_beam_thickness 1.5

# Keyboard shortcuts
map ctrl+shift+n new_window
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+l send_text all l

# Theme
# Note: You'll need to install a theme separately
# You can use kitty's built-in themes or create your own
# Example: include ~/.config/kitty/themes/iterm.conf 